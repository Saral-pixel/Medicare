<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicare - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="Styles/signup-login.css">
</head>

<body>
    <div class="login-signup-parent">
        <div class="head">Login to your account</div>
        <div class="login-signup">
            <div class="label">Username:</div>
            <input type="text" placeholder="Username/Email">

            <div class="label">Password:</div>
            <input type="password" placeholder="XXXXXXXXXX">

            <div class="login-signup-change">Don't have an account? <a id="signup-or-login" href="signup.html">Sign
                    up</a> now!</div>

            <div class="login-signup-button-container">
                <button>
                    <i class="fa-solid fa-user"></i>
                    Login</button>

            </div>
        </div>
        <div class="back-to-home">
            <a href="index.html" class="home-button">
                <i class="fa-solid fa-house"></i>
                Back to Home
            </a>
        </div>
    </div>
    </div>
</body>

</html>
